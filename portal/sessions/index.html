<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sessions - Empath Portal</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="../../empath-icon.png" />
  <link rel="stylesheet" href="../../styles.css" />
  <link rel="stylesheet" href="../portal.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="nav" id="nav" role="navigation" aria-label="Portal navigation">
    <div class="nav__inner container">
      <a href="/portal/" class="nav__logo" aria-label="Client portal home">
        <img src="../../empath-icon.png" alt="" class="nav__logo-icon" aria-hidden="true" />
        Empath Portal
      </a>
      <div class="nav__links" id="navLinks" role="menubar">
        <a href="/portal/" class="nav__link" role="menuitem">Dashboard</a>
        <a href="/portal/sessions/" class="nav__link" role="menuitem">Sessions</a>
        <a href="/portal/job-analysis/" class="nav__link" role="menuitem">Job Analysis</a>
        <a href="/portal/resume-feedback/" class="nav__link" role="menuitem">Resume</a>
        <a href="/portal/progress/" class="nav__link" role="menuitem">Progress</a>
        <button class="btn btn--outline nav__cta" id="signOutBtn">Sign Out</button>
      </div>
      <button class="nav__hamburger" id="hamburger" aria-label="Open navigation menu" aria-expanded="false" aria-controls="navLinks">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="app-layout">
    <aside class="app-sidebar">
      <div class="app-sidebar__section">
        <div class="app-sidebar__label">Portal</div>
        <a href="/portal/" class="app-sidebar__link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="/portal/sessions/" class="app-sidebar__link is-active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Sessions
        </a>
        <a href="/portal/job-analysis/" class="app-sidebar__link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Job Analysis
        </a>
        <a href="/portal/resume-feedback/" class="app-sidebar__link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          Resume Review
        </a>
        <a href="/portal/progress/" class="app-sidebar__link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Progress
        </a>
      </div>
    </aside>

    <main class="app-content">
      <div class="app-page-header">
        <h1 class="app-page-header__title">Session History</h1>
        <p class="app-page-header__subtitle">Notes and action items from your coaching sessions.</p>
      </div>

      <div id="sessionList"></div>

      <div class="empty-state" id="emptyState" hidden>
        <h2 class="empty-state__heading">No sessions yet.</h2>
        <p class="empty-state__text">Your session notes will appear here after your first coaching session with David.</p>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../../firebase/firebase-config.js"></script>
  <script src="../../firebase/auth-guard.js"></script>
  <script src="../../firebase/firestore-helpers.js"></script>
  <script>
  (function () {
    document.addEventListener('empathAuthReady', async function () {
      var uid = window.empathAuth.user.uid;

      // Sign out
      document.getElementById('signOutBtn').addEventListener('click', function () {
        auth.signOut().then(function () { window.location.replace('/login/'); });
      });

      // Hamburger
      var hamburger = document.getElementById('hamburger');
      var navLinks = document.getElementById('navLinks');
      if (hamburger) {
        hamburger.addEventListener('click', function () {
          var open = navLinks.classList.toggle('is-open');
          hamburger.setAttribute('aria-expanded', open);
        });
      }

      try {
        var sessions = await Empath.db.getCollection('users/' + uid + '/sessions', 'date', 'desc');
        if (sessions.length === 0) {
          document.getElementById('emptyState').hidden = false;
          return;
        }

        var typeMap = {
          'check-in': 'Check-In', 'mock-behavioral': 'Mock Behavioral',
          'mock-technical': 'Mock Technical', 'mock-full': 'Full Mock Interview',
          'live-coding': 'Live Coding', 'strategy': 'Strategy',
          'negotiation': 'Negotiation', 'offer-coaching': 'Offer Coaching',
          'resume-review': 'Resume Review', 'other': 'Other'
        };

        document.getElementById('sessionList').innerHTML = sessions.map(function (s) {
          var date = s.date && s.date.toDate ? s.date.toDate().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
          var type = typeMap[s.type] || s.type || '';
          var actionHtml = '';
          if (s.actionItems && s.actionItems.length > 0) {
            actionHtml = '<ul class="action-items">' +
              s.actionItems.map(function (ai) {
                var cls = ai.completed ? ' action-item--completed' : '';
                var checked = ai.completed ? ' checked' : '';
                return '<li class="action-item' + cls + '"><input type="checkbox"' + checked + ' disabled /><span>' + esc(ai.text) + '</span></li>';
              }).join('') + '</ul>';
          }
          return '<div class="app-card">' +
            '<div class="app-card__header">' +
              '<span class="app-card__title">' + esc(s.title) + '</span>' +
              '<span class="app-card__meta">' + date + (type ? ' &middot; ' + type : '') + (s.duration ? ' &middot; ' + s.duration + ' min' : '') + '</span>' +
            '</div>' +
            '<div class="app-card__body">' +
              '<p style="white-space:pre-wrap;">' + esc(s.notes) + '</p>' +
              actionHtml +
            '</div>' +
            '<div class="comment-container" data-path="users/' + uid + '/sessions/' + s.id + '"></div>' +
            '</div>';
        }).join('');

        // Render comment threads
        var authorName = window.empathAuth.userDoc.displayName || 'Client';
        document.querySelectorAll('.comment-container').forEach(function (el) {
          Empath.renderCommentThread(el, el.dataset.path, 'client', authorName);
        });
      } catch (err) {
        console.error('Sessions load error:', err);
      }

      function esc(str) {
        var el = document.createElement('span');
        el.textContent = str || '';
        return el.innerHTML;
      }
    });
  })();
  </script>
</body>
</html>
