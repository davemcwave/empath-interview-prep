<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In - Empath Interview Prep</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="../empath-icon.png" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="nav" id="nav" role="navigation" aria-label="Main navigation">
    <div class="nav__inner container">
      <a href="../" class="nav__logo" aria-label="Empath Interview Prep home">
        <img src="../empath-icon.png" alt="" class="nav__logo-icon" aria-hidden="true" />
        Empath Interview Prep
      </a>
    </div>
  </nav>

  <main>
    <section class="review-form-section">
      <div class="container review-form-container">

        <div class="review-form-header">
          <div class="section-label">Client Portal</div>
          <h1 class="review-form-heading">Sign in to your portal.</h1>
        </div>

        <!-- View 1: Email form (default) -->
        <div class="review-form" id="viewEmail">
          <form id="emailForm">
            <div class="form-group">
              <label class="form-label" for="email">Email Address <span class="form-required">*</span></label>
              <input class="form-input" type="email" id="email" required placeholder="jane@example.com" autocomplete="email" />
            </div>
            <button type="submit" class="btn btn--accent btn--lg form-submit" id="sendLinkBtn">Send Sign-In Link</button>
          </form>

          <p class="login-alt-link">
            <button type="button" class="login-retry-btn" id="showPasswordBtn">I have a password</button>
          </p>

          <div class="login-divider"><span>or</span></div>

          <button type="button" class="btn btn--google" id="googleBtn">
            <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Sign in with Google
          </button>
        </div>

        <!-- View 2: Password form (revealed by "I have a password") -->
        <div class="review-form" id="viewPassword" hidden>
          <form id="passwordForm">
            <div class="form-group">
              <label class="form-label" for="pwEmail">Email Address <span class="form-required">*</span></label>
              <input class="form-input" type="email" id="pwEmail" required placeholder="jane@example.com" autocomplete="email" />
            </div>
            <div class="form-group">
              <label class="form-label" for="password">Password <span class="form-required">*</span></label>
              <input class="form-input" type="password" id="password" required placeholder="Enter your password" autocomplete="current-password" />
            </div>
            <button type="submit" class="btn btn--accent btn--lg form-submit" id="passwordBtn">Sign In</button>
          </form>
          <p class="login-alt-link">
            <button type="button" class="login-retry-btn" id="backToEmail">Back</button>
          </p>
        </div>

        <!-- Link sent confirmation -->
        <div class="login-message" id="viewLinkSent" hidden>
          <div class="login-message__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="48" height="48">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
          </div>
          <h2 class="login-message__heading">Check your email.</h2>
          <p class="login-message__text">We sent a sign-in link to <strong id="sentEmail"></strong>. Click the link to access your portal.</p>
          <p class="login-message__hint">Didn't get it? Check your spam folder, or <button class="login-retry-btn" id="retryBtn">try again</button>.</p>
        </div>

        <!-- Signing in spinner -->
        <div class="login-message" id="viewSigningIn" hidden>
          <div class="login-spinner" aria-hidden="true"></div>
          <h2 class="login-message__heading">Signing you in...</h2>
        </div>

        <!-- Error state -->
        <div class="login-message login-message--error" id="viewError" hidden>
          <h2 class="login-message__heading">Something went wrong.</h2>
          <p class="login-message__text" id="errorText"></p>
          <button class="btn btn--outline" id="errorRetryBtn">Try Again</button>
        </div>

      </div>
    </section>
  </main>

  <footer class="footer" role="contentinfo">
    <div class="footer__bottom">
      <div class="container">
        <p class="footer__copy">&copy; 2025 Empath Interview Prep. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../firebase/firebase-config.js"></script>
  <script src="login.js"></script>
</body>
</html>
