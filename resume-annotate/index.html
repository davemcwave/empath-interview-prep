<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Annotator - Empath Interview Prep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar__logo">
        <span class="sidebar__logo-mark">✦</span>
        Empath<br/>Annotator
      </div>

      <div class="sidebar__section">
        <label class="btn btn--upload">
          Upload PDF
          <input type="file" id="pdfUpload" accept=".pdf" hidden />
        </label>
      </div>

      <div class="sidebar__section sidebar__section--tools" id="toolsSection">
        <div class="sidebar__label">Tools</div>
        <button class="tool-btn active" data-tool="select">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3l14 9-7 1-4 7L5 3z"/></svg>
          Select
        </button>
        <button class="tool-btn" data-tool="highlight">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="8" width="18" height="8" rx="1"/></svg>
          Highlight
        </button>
        <button class="tool-btn" data-tool="circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg>
          Circle
        </button>
        <button class="tool-btn" data-tool="draw">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17c3-3 6-6 9-6s5 3 9 3"/></svg>
          Freehand
        </button>
        <button class="tool-btn" data-tool="text">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V5h16v2M9 5v14m6-14v14M9 19h6"/></svg>
          Text
        </button>
        <button class="tool-btn tool-btn--delete" data-tool="delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          Delete
        </button>
      </div>

      <div class="sidebar__section sidebar__section--colors" id="colorSection">
        <div class="sidebar__label">Color</div>
        <div class="color-swatches">
          <button class="color-swatch active" data-color="#FFEB3B" style="background:#FFEB3B" title="Yellow"></button>
          <button class="color-swatch" data-color="#FF5252" style="background:#FF5252" title="Red"></button>
          <button class="color-swatch" data-color="#4CAF50" style="background:#4CAF50" title="Green"></button>
          <button class="color-swatch" data-color="#2196F3" style="background:#2196F3" title="Blue"></button>
          <button class="color-swatch" data-color="#FF9800" style="background:#FF9800" title="Orange"></button>
        </div>
      </div>

      <div class="sidebar__section sidebar__section--actions" id="actionsSection">
        <div class="sidebar__label">Actions</div>
        <button class="tool-btn" id="undoBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10h10a7 7 0 0 1 0 14H3"/><polyline points="3 10 7 6 3 2 3 10"/></svg>
          Undo
        </button>
        <button class="tool-btn" id="saveBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
          Save
        </button>
        <button class="tool-btn tool-btn--export" id="exportBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export for Client
        </button>
      </div>

      <div class="sidebar__section" id="pageSection">
        <div class="sidebar__label">Document</div>
        <div class="doc-info" id="docInfo"></div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main" id="main">
      <div class="drop-zone" id="dropZone">
        <div class="drop-zone__inner">
          <div class="drop-zone__icon">📄</div>
          <p class="drop-zone__heading">Upload a resume to annotate</p>
          <p class="drop-zone__sub">Drag and drop a PDF here, or choose a file</p>
          <label class="btn btn--accent">
            Choose PDF
            <input type="file" id="pdfUpload2" accept=".pdf" hidden />
          </label>
        </div>
      </div>
      <div class="pages-container" id="pagesContainer"></div>
    </main>

  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
